name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-structure:
    name: Validate skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run structure validation
        run: bash scripts/validate-skill.sh

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck install.sh scripts/validate-skill.sh

  typecheck-templates:
    name: Typecheck Action templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck templates
        run: npm run typecheck

  install-smoke-test:
    name: Install script smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run installer (non-interactive)
        run: ./install.sh -y

      - name: Verify Cursor skill installed
        run: |
          test -f "$HOME/.cursor/skills/solana-actions-blinks/SKILL.md"
          test -f "$HOME/.cursor/skills/solana-actions-blinks/templates/transfer-sol-route.ts"
          test -f "$HOME/.cursor/skills/solana-actions-blinks/commands/build-tip-action.md"
          test -f "$HOME/.cursor/skills/solana-actions-blinks/agents/blink-engineer.md"

      - name: Verify Claude skill installed
        run: |
          test -f "$HOME/.claude/skills/solana-actions-blinks/SKILL.md"

  ci-gate:
    name: CI gate (all checks)
    runs-on: ubuntu-latest
    needs: [validate-structure, typecheck-templates, install-smoke-test]
    steps:
      - run: echo "All CI checks passed"
